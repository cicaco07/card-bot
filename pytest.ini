[pytest]
# Discover tests under tests/ and keep the repository root importable so that
# `import bot`, `import uno`, and `import poker` resolve when running `pytest`
# from the project root. (conftest.py also inserts the root into sys.path as a
# fallback for older pytest versions.)
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
